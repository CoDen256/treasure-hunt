<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#17101f">
    <title>Break Every Seal</title>

    <!--
      ============================================================
      HOW TO USE THIS FILE
      ============================================================
      1. Scroll down into the <script> tag near the bottom and find
         the block marked "EDIT YOUR CONTENT HERE". That's the only
         part you need to touch — riddles, songs, header text, and
         the final clue all live there in plain, commented arrays.
      2. For songs: drop the audio files next to this HTML file
         (e.g. in a "songs" folder) and point each "src" at it, or
         paste a direct link to an already-hosted audio file.
      3. To deploy: make a new GitHub repository, upload this file
         (keep the name index.html), then go to
         Settings → Pages → set the source branch. It'll be live at
         https://yourusername.github.io/reponame/
      4. Duplicate this file per stop and just edit the content
         block each time — the design stays consistent.
      ============================================================
    -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600;1,9..144,700&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --ink: #17101f;
            --plum: #2a1a34;
            --wine: #3a1d30;
            --parchment: #f4ecdd;
            --muted: #b2a5c2;
            --seal: #d6a05c;
            --seal-light: #f0c988;
            --seal-deep: #9c6a34;
            --mint: #8fdba8;
            --rose: #e69090;
            --card-bg: rgba(255,255,255,0.035);
            --card-line: rgba(214,160,92,0.28);
            --card-line-soft: rgba(214,160,92,0.12);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            overflow-x: hidden;
        }

        body {
            background-image:
                    radial-gradient(circle, rgba(244,236,221,0.035) 1px, transparent 1.2px),
                    linear-gradient(165deg, var(--ink), var(--plum) 55%, var(--wine));
            background-size: 3px 3px, cover;
            background-repeat: repeat, no-repeat;
            background-attachment: fixed, fixed;
            color: var(--parchment);
            font-family: 'Manrope', sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* ---------- ambient sparkle layer ---------- */
        #sparkles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .sparkle {
            position: absolute;
            bottom: -10px;
            border-radius: 50%;
            background: var(--seal-light);
            opacity: 0;
            will-change: transform, opacity;
            animation: float-up linear infinite;
        }
        @keyframes float-up {
            0%   { transform: translateY(0) translateX(0); opacity: 0; }
            10%  { opacity: 0.5; }
            90%  { opacity: 0.2; }
            100% { transform: translateY(-110vh) translateX(var(--drift, 20px)); opacity: 0; }
        }

        /* ---------- layout ---------- */
        .wrap {
            position: relative;
            z-index: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 36px 20px calc(64px + env(safe-area-inset-bottom));
        }

        .eyebrow {
            text-align: center;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--seal);
            margin-bottom: 14px;
        }

        h1.title {
            font-family: 'Fraunces', serif;
            font-weight: 600;
            font-size: 33px;
            line-height: 1.2;
            text-align: center;
            margin: 0 0 10px;
            color: var(--parchment);
        }

        .subtitle {
            text-align: center;
            font-size: 14.5px;
            line-height: 1.5;
            color: var(--muted);
            margin: 0 0 28px;
        }

        /* ---------- seal-strand progress ---------- */
        .progress-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 28px;
        }
        .seal-strand {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
        }
        .seal-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1.5px solid rgba(214,160,92,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fraunces', serif;
            font-size: 8px;
            color: transparent;
            flex-shrink: 0;
            transition: all 0.4s cubic-bezier(.34,1.56,.64,1);
        }
        .seal-dot.opened {
            background: radial-gradient(circle at 35% 30%, var(--seal-light), var(--seal-deep));
            border-color: var(--seal);
            color: #3a2210;
            transform: scale(1.08);
        }
        .seal-count {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            color: var(--muted);
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--card-line), transparent);
            margin: 26px 0;
            border: none;
        }

        .section-head {
            margin: 8px 0 6px;
        }
        .section-head h2 {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 600;
            font-size: 20px;
            margin: 0 0 4px;
            color: var(--seal-light);
        }
        .section-note {
            font-size: 13px;
            color: var(--muted);
            margin: 0 0 16px;
        }

        /* ---------- stationery cards ---------- */
        .card {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--card-line);
            border-radius: 6px;
            padding: 22px 20px;
            margin-bottom: 14px;
            overflow: visible;
        }
        .card::before {
            content: '';
            position: absolute;
            inset: 6px;
            border: 1px solid var(--card-line-soft);
            border-radius: 3px;
            pointer-events: none;
        }
        .card.shake { animation: shake 0.4s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .stamp {
            position: absolute;
            top: -12px;
            right: -10px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, var(--seal-light), var(--seal-deep));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: 15px;
            color: #3a2210;
            opacity: 0;
            transform: scale(0) rotate(-25deg);
            transition: opacity 0.3s, transform 0.4s cubic-bezier(.34,1.56,.64,1);
            box-shadow: 0 3px 10px rgba(0,0,0,0.35);
            pointer-events: none;
        }
        .stamp.show {
            opacity: 1;
            transform: scale(1) rotate(-12deg);
        }

        .item-label {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }
        .q-text {
            font-size: 16px;
            line-height: 1.55;
            color: var(--parchment);
            margin-bottom: 16px;
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        input[type="text"] {
            flex: 1;
            min-width: 0;
            height: 44px;
            padding: 0 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.16);
            border-radius: 6px;
            color: var(--parchment);
            font-family: 'Manrope', sans-serif;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--seal); }
        input[type="text"]:disabled { opacity: 0.65; }

        .btn-check {
            height: 44px;
            padding: 0 16px;
            background: linear-gradient(135deg, var(--seal-light), var(--seal-deep));
            border: none;
            border-radius: 6px;
            color: #3a2210;
            font-family: 'Manrope', sans-serif;
            font-weight: 700;
            font-size: 13.5px;
            letter-spacing: 0.3px;
            white-space: nowrap;
            cursor: pointer;
            transition: transform 0.15s;
        }
        .btn-check:active { transform: scale(0.95); }
        .btn-check.done {
            background: transparent;
            border: 1.5px solid var(--mint);
            color: var(--mint);
        }

        .feedback {
            min-height: 18px;
            font-size: 13px;
            margin-top: 9px;
        }
        .feedback.correct { color: var(--mint); }
        .feedback.wrong { color: var(--rose); }

        .hint-toggle {
            display: inline-block;
            margin-top: 10px;
            padding: 0;
            background: none;
            border: none;
            font-family: 'Manrope', sans-serif;
            font-size: 12px;
            color: var(--muted);
            text-decoration: underline;
            text-underline-offset: 2px;
            cursor: pointer;
        }
        .hint-text {
            display: none;
            margin-top: 8px;
            padding: 10px 12px;
            background: rgba(214,160,92,0.08);
            border-left: 2px solid var(--seal);
            border-radius: 0 4px 4px 0;
            font-size: 13px;
            font-style: italic;
            color: var(--seal-light);
        }
        .hint-text.show { display: block; }

        /* ---------- enclosure (song) rows ---------- */
        .song-top {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .song-num {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: rgba(214,160,92,0.14);
            color: var(--seal-light);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .song-mask {
            font-size: 13px;
            font-style: italic;
            color: var(--muted);
        }

        .player {
            margin-bottom: 16px;
        }
        audio { display: none; }
        .player-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .play-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--seal-light), var(--seal-deep));
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.15s;
        }
        .play-btn:active { transform: scale(0.92); }
        .play-icon {
            width: 0; height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 10px solid #3a2210;
            margin-left: 3px;
        }
        .pause-icon { display: flex; gap: 3px; }
        .pause-icon span {
            width: 3px; height: 12px;
            background: #3a2210;
            border-radius: 1px;
            display: block;
        }
        .player-track {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.12);
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }
        .player-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--seal-deep), var(--seal-light));
            border-radius: 3px;
        }
        .player-time {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11.5px;
            color: var(--muted);
            min-width: 32px;
            text-align: right;
        }

        /* ---------- final reveal ---------- */
        .final-section { display: none; }
        .final-section.show {
            display: block;
            animation: fadeInUp 0.7s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .final-card {
            text-align: center;
            padding: 34px 24px;
            border-color: var(--seal);
        }
        .final-seal {
            width: 68px;
            height: 68px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, var(--seal-light), var(--seal-deep));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-size: 32px;
            color: #3a2210;
            box-shadow: 0 6px 24px rgba(214,160,92,0.35);
            animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) 0.15s both;
        }
        @keyframes popIn {
            from { transform: scale(0) rotate(-30deg); opacity: 0; }
            to { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        .final-eyebrow {
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .final-title {
            font-family: 'Fraunces', serif;
            font-style: italic;
            font-weight: 600;
            font-size: 29px;
            margin: 0 0 16px;
            color: var(--parchment);
        }
        .final-body {
            font-size: 15.5px;
            line-height: 1.6;
            color: var(--parchment);
        }
        .final-body img {
            max-width: 100%;
            border-radius: 6px;
            margin-top: 12px;
        }

        @media (prefers-reduced-motion: reduce) {
            .sparkle { display: none; }
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>

<div id="sparkles"></div>

<div class="wrap">
    <div class="eyebrow" id="eyebrow-label"></div>
    <h1 class="title" id="page-title"></h1>
    <p class="subtitle" id="page-subtitle"></p>

    <div class="progress-wrap">
        <div class="seal-strand" id="seal-strand"></div>
        <div class="seal-count" id="seal-count">0 / 0</div>
    </div>

    <hr class="divider">

    <div class="section-head">
        <h2>The Notes</h2>
    </div>
    <p class="section-note">Work through these together.</p>
    <div id="riddles-container"></div>

    <hr class="divider">

    <div class="section-head">
        <h2>Enclosures</h2>
    </div>
    <p class="section-note">No titles. No names. Just listen.</p>
    <div id="songs-container"></div>

    <div class="final-section" id="final-section">
        <hr class="divider">
        <div class="card final-card">
            <div class="final-seal">&amp;</div>
            <div class="final-eyebrow">Every note is open</div>
            <h2 class="final-title">Unsealed</h2>
            <div class="final-body" id="final-clue-content"></div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // ✏️  EDIT YOUR CONTENT HERE  — everything below this banner
    //     is the only part you need to touch.
    // ============================================================

    // The small line above the title, e.g. "STOP 01 — THE LIBRARY"
    const STOP_LABEL = "STOP 01 — THE LIBRARY";

    // Main heading and the line underneath it
    const PAGE_TITLE = "Break Every Seal";
    const PAGE_SUBTITLE = "Solve what's below to open the final note.";

    // Riddles / questions. Add or remove entries freely.
    // "answers" can list more than one accepted spelling/variant.
    // "hint" is optional — leave it as "" to hide the hint button.
    const RIDDLES = [
        {
            question: "Replace this with your first riddle or question.",
            answers: ["example answer"],
            hint: ""
        },
        {
            question: "Replace this with your second riddle or question.",
            answers: ["example answer"],
            hint: "You can add an optional nudge here."
        }
    ];

    // Songs for the "Enclosures" listening challenge.
    // "src" — a file path (e.g. "songs/track1.mp3") once you upload
    //   the audio next to this HTML file, or a direct hosted URL.
    //   Leave it "" for now — the player will just wait for it.
    // "answers" — what counts as a correct guess (title, artist,
    //   or whatever you're actually asking them to name).
    const SONGS = [
        { src: "", answers: ["song one title"], hint: "" },
        { src: "", answers: ["song two title"], hint: "" },
        { src: "", answers: ["song three title"], hint: "" },
        { src: "", answers: ["song four title"], hint: "" },
        { src: "", answers: ["song five title"], hint: "" },
        { src: "", answers: ["song six title"], hint: "" }
    ];

    // Shown once every note above is opened. Plain text, or add
    // your own HTML — e.g. an <img src="..."> for a photo clue.
    const FINAL_CLUE_HTML = `
    <p>Replace this with your next clue — a riddle, coordinates,
    or a photo of where to go next.</p>
  `;

    // ============================================================
    // Design + logic below. No need to edit anything past here.
    // ============================================================

    const solvedSet = new Set();

    function normalize(str) {
        return str
            .trim()
            .toLowerCase()
            .replace(/æ/g, 'ae')
            .replace(/ø/g, 'o')
            .replace(/å/g, 'a')
            .replace(/ä/g, 'a')
            .replace(/ö/g, 'o')
            .replace(/ü/g, 'u')
            .replace(/ß/g, 'ss')
            .replace(/[^\w\s]/g, '')
            .replace(/\s+/g, ' ');
    }

    // ---------------- rendering ----------------

    function renderHeader() {
        document.getElementById('eyebrow-label').textContent = STOP_LABEL;
        document.getElementById('page-title').textContent = PAGE_TITLE;
        document.getElementById('page-subtitle').textContent = PAGE_SUBTITLE;
    }

    function renderSealStrand() {
        const total = RIDDLES.length + SONGS.length;
        const container = document.getElementById('seal-strand');
        container.innerHTML = '';
        for (let i = 0; i < total; i++) {
            const dot = document.createElement('div');
            dot.className = 'seal-dot';
            dot.id = `seal-dot-${i}`;
            dot.textContent = '&';
            container.appendChild(dot);
        }
        document.getElementById('seal-count').textContent = `0 / ${total}`;
    }

    function renderRiddles() {
        const container = document.getElementById('riddles-container');
        container.innerHTML = RIDDLES.map((r, i) => `
      <div class="card" id="riddle-card-${i}">
        <div class="stamp" id="riddle-stamp-${i}">&amp;</div>
        <div class="item-label">Note ${String(i + 1).padStart(2, '0')}</div>
        <div class="q-text">${r.question}</div>
        <div class="input-row">
          <input type="text" id="riddle-input-${i}" placeholder="Your answer" enterkeyhint="go"
            onkeydown="if(event.key==='Enter'){checkAnswer('riddle', ${i})}">
          <button class="btn-check" id="riddle-btn-${i}" onclick="checkAnswer('riddle', ${i})">Unseal</button>
        </div>
        <div class="feedback" id="riddle-feedback-${i}"></div>
        ${r.hint ? `
          <button class="hint-toggle" id="riddle-hint-toggle-${i}" onclick="toggleHint('riddle', ${i})">Need a nudge?</button>
          <div class="hint-text" id="riddle-hint-${i}">${r.hint}</div>
        ` : ''}
      </div>
    `).join('');
    }

    function renderSongs() {
        const container = document.getElementById('songs-container');
        container.innerHTML = SONGS.map((s, i) => `
      <div class="card" id="song-card-${i}">
        <div class="stamp" id="song-stamp-${i}">&amp;</div>
        <div class="song-top">
          <div class="song-num">${String(i + 1).padStart(2, '0')}</div>
          <div class="song-mask">Mystery track</div>
        </div>
        <div class="player">
          <audio id="audio-${i}" ${s.src ? `src="${s.src}"` : ''} preload="metadata"></audio>
          <div class="player-controls">
            <button class="play-btn" id="play-btn-${i}" onclick="togglePlay(${i})">
              <span class="play-icon"></span>
            </button>
            <div class="player-track" id="player-track-${i}" onclick="seek(event, ${i})">
              <div class="player-fill" id="player-fill-${i}"></div>
            </div>
            <div class="player-time" id="player-time-${i}">0:00</div>
          </div>
        </div>
        <div class="input-row">
          <input type="text" id="song-input-${i}" placeholder="Name this song" enterkeyhint="go"
            onkeydown="if(event.key==='Enter'){checkAnswer('song', ${i})}">
          <button class="btn-check" id="song-btn-${i}" onclick="checkAnswer('song', ${i})">Unseal</button>
        </div>
        <div class="feedback" id="song-feedback-${i}"></div>
        ${s.hint ? `
          <button class="hint-toggle" id="song-hint-toggle-${i}" onclick="toggleHint('song', ${i})">Need a nudge?</button>
          <div class="hint-text" id="song-hint-${i}">${s.hint}</div>
        ` : ''}
      </div>
    `).join('');
    }

    // ---------------- answer checking ----------------

    function checkAnswer(type, index) {
        const data = type === 'riddle' ? RIDDLES[index] : SONGS[index];
        const inputEl = document.getElementById(`${type}-input-${index}`);
        const feedbackEl = document.getElementById(`${type}-feedback-${index}`);
        const cardEl = document.getElementById(`${type}-card-${index}`);
        const btnEl = document.getElementById(`${type}-btn-${index}`);
        const stampEl = document.getElementById(`${type}-stamp-${index}`);

        const userAnswer = normalize(inputEl.value);
        const isCorrect = userAnswer.length > 0 && data.answers.some(a => normalize(a) === userAnswer);

        if (isCorrect) {
            const key = `${type}-${index}`;
            if (!solvedSet.has(key)) {
                solvedSet.add(key);
                markSealDot(type === 'riddle' ? index : RIDDLES.length + index);
                updateProgress();
            }
            cardEl.classList.remove('shake');
            inputEl.disabled = true;
            btnEl.textContent = 'Opened';
            btnEl.classList.add('done');
            feedbackEl.textContent = 'Correct — the seal breaks.';
            feedbackEl.className = 'feedback correct';
            stampEl.classList.add('show');
        } else {
            feedbackEl.textContent = 'Not quite — try again.';
            feedbackEl.className = 'feedback wrong';
            cardEl.classList.remove('shake');
            void cardEl.offsetWidth;
            cardEl.classList.add('shake');
        }
    }

    function markSealDot(globalIdx) {
        const dot = document.getElementById(`seal-dot-${globalIdx}`);
        if (dot) dot.classList.add('opened');
    }

    function updateProgress() {
        const total = RIDDLES.length + SONGS.length;
        document.getElementById('seal-count').textContent = `${solvedSet.size} / ${total}`;
        if (solvedSet.size === total && total > 0) {
            revealFinalClue();
        }
    }

    function revealFinalClue() {
        const finalSection = document.getElementById('final-section');
        if (finalSection.classList.contains('show')) return;
        finalSection.classList.add('show');
        burstSparkles();
        setTimeout(() => {
            finalSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 150);
    }

    function toggleHint(type, index) {
        const el = document.getElementById(`${type}-hint-${index}`);
        const toggle = document.getElementById(`${type}-hint-toggle-${index}`);
        const showing = el.classList.toggle('show');
        toggle.textContent = showing ? 'Hide the nudge' : 'Need a nudge?';
    }

    // ---------------- audio player ----------------

    function iconPlayHTML() { return '<span class="play-icon"></span>'; }
    function iconPauseHTML() { return '<span class="pause-icon"><span></span><span></span></span>'; }

    function togglePlay(i) {
        const audio = document.getElementById(`audio-${i}`);
        if (!audio.getAttribute('src')) {
            alert('No audio file added yet for this track — add a file path in the SONGS array near the top of the script.');
            return;
        }
        const wasPaused = audio.paused;

        document.querySelectorAll('audio').forEach(a => a.pause());
        document.querySelectorAll('.play-btn').forEach(b => b.innerHTML = iconPlayHTML());

        if (wasPaused) {
            audio.play().catch(() => {});
            document.getElementById(`play-btn-${i}`).innerHTML = iconPauseHTML();
        }
    }

    function seek(evt, i) {
        const audio = document.getElementById(`audio-${i}`);
        if (!audio.duration || !isFinite(audio.duration)) return;
        const track = document.getElementById(`player-track-${i}`);
        const rect = track.getBoundingClientRect();
        const ratio = Math.min(Math.max((evt.clientX - rect.left) / rect.width, 0), 1);
        audio.currentTime = ratio * audio.duration;
    }

    function formatTime(sec) {
        if (!isFinite(sec) || sec < 0) return '0:00';
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function attachAudioEvents() {
        SONGS.forEach((s, i) => {
            const audio = document.getElementById(`audio-${i}`);
            const fill = document.getElementById(`player-fill-${i}`);
            const timeLabel = document.getElementById(`player-time-${i}`);
            const btn = document.getElementById(`play-btn-${i}`);

            audio.addEventListener('timeupdate', () => {
                if (audio.duration && isFinite(audio.duration)) {
                    fill.style.width = `${(audio.currentTime / audio.duration) * 100}%`;
                }
                timeLabel.textContent = formatTime(audio.currentTime);
            });
            audio.addEventListener('ended', () => {
                btn.innerHTML = iconPlayHTML();
                fill.style.width = '0%';
                timeLabel.textContent = '0:00';
            });
            audio.addEventListener('pause', () => {
                btn.innerHTML = iconPlayHTML();
            });
        });
    }

    // ---------------- sparkles ----------------

    function spawnSparkle(container, fast) {
        const el = document.createElement('div');
        el.className = 'sparkle';
        const size = Math.random() * 4 + 2;
        el.style.width = `${size}px`;
        el.style.height = `${size}px`;
        el.style.left = `${Math.random() * 100}%`;
        el.style.setProperty('--drift', `${(Math.random() - 0.5) * (fast ? 100 : 60)}px`);
        const duration = fast ? (Math.random() * 2.5 + 2) : (Math.random() * 10 + 12);
        el.style.animationDuration = `${duration}s`;
        if (!fast) el.style.animationDelay = `${Math.random() * duration}s`;
        container.appendChild(el);
        if (fast) setTimeout(() => el.remove(), duration * 1000 + 400);
    }

    function initSparkles(count = 14) {
        const container = document.getElementById('sparkles');
        for (let i = 0; i < count; i++) spawnSparkle(container, false);
    }

    function burstSparkles(count = 22) {
        const container = document.getElementById('sparkles');
        for (let i = 0; i < count; i++) spawnSparkle(container, true);
    }

    // ---------------- init ----------------

    document.addEventListener('DOMContentLoaded', () => {
        renderHeader();
        renderSealStrand();
        renderRiddles();
        renderSongs();
        attachAudioEvents();
        document.getElementById('final-clue-content').innerHTML = FINAL_CLUE_HTML;
        initSparkles();
    });
</script>
</body>
</html>
