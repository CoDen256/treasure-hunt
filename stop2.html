<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#17101f">
    <title>Break Every Seal – Stop 02</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600;1,9..144,700&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
</head>
<body>

<div id="sparkles"></div>

<div id="cel-overlay" class="cel-overlay">
    <div class="cel-seal">&amp;</div>
    <h2 class="cel-title">Every seal broken.</h2>
    <p class="cel-sub" id="cel-sub">You've solved this stop.</p>
    <div id="cel-action"></div>
</div>

<div class="wrap">
    <div class="eyebrow" id="eyebrow-label"></div>
    <h1 class="title" id="page-title"></h1>
    <p class="subtitle" id="page-subtitle"></p>
    <div class="progress-wrap">
        <div class="seal-strand" id="seal-strand"></div>
        <div class="seal-count" id="seal-count">0 / 0</div>
    </div>
    <hr class="divider">
    <!-- Riddle display: shown when config.riddles is non-empty -->
    <div id="sections-container"></div>
    <div id="cel-inline" class="inline-action" style="display:none"></div>
</div>

<script src="shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    VerifyPage.init({
        stopLabel:    "STOP 02 — REGINA PALAST",
        pageTitle:    "Break Every Seal",
        pageSubtitle: "Read the notes below, then verify your answers.",
        sections: [
            {
                title: "The Challenges",
                note:  "Read these together — the answers point to your next stop.",
                items: [
                    {
                        type:  'poem',
                        label: "Riddle",
                        text:  `In a room where logic wages war,
She battles bugs she's fought before.
Each broken thing she learns to mend,
Though the fixing seems to never end.

Nearby a door holds secrets grim,
A room best entered on a whim
Of holding breath and moving quick—
The air in there could make you sick.

And when the summer sun turns cruel,
Her colleagues sweat—it's not too cool—
Their nether regions, we won't lie,
Emit a scent that makes you cry.
Yes, summertime brings certain balls
Whose funk could clear out office halls.

A friend once sat among that crew,
Learning ropes and passwords too,
Before she found her present place—
But still recalls that office space.

No chair is hers, no desk, no throne—
She wanders daily, seat unknown,
A nomad among the working masses,
Squatting wherever a spot amasses.

So find the spot where ships don't float,
Yet still a fleet, and still afloat`
                    },
                    {
                        type:  'display',
                        label: "Trivia",
                        text:  "In television and film production, " +
                            "there's a term for an episode that unfolds almost " +
                            "entirely within a single, confined location — often written" +
                            " specifically to save money by limiting sets, cast, and shooting " +
                            "days. Some of the most acclaimed episodes in prestige television " +
                            "history use this technique, turning budget constraints into tense, " +
                            "claustrophobic storytelling."+
                        "What is this production term called?"
                    }
                ]
            },
            {
                items: [
                    { type: 'text', label: "Where should you go next?", answers: ["WEBFLEET", "WEB FLEET"], hint: "" },
                    { type: 'text', label: "What should you look for?",  answers: ["BOTTLEIN A BUSH"], hint: "", suffix:"IN A BUSH" },
                ]
            }
        ],
        successType: 'normal',
        nextPage:    'stop3.html'
    });
});
</script>
</body>
</html>
