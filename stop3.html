<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#17101f">
    <title>Break Every Seal – Stop 03</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600;1,9..144,700&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
</head>
<body>

<div id="sparkles"></div>

<div id="cel-overlay" class="cel-overlay">
    <div class="cel-seal">&amp;</div>
    <h2 class="cel-title">Every seal broken.</h2>
    <p class="cel-sub" id="cel-sub">You've solved this stop.</p>
    <div id="cel-action"></div>
</div>

<div class="wrap">
    <div class="eyebrow" id="eyebrow-label"></div>
    <h1 class="title" id="page-title"></h1>
    <p class="subtitle" id="page-subtitle"></p>
    <div class="progress-wrap">
        <div class="seal-strand" id="seal-strand"></div>
        <div class="seal-count" id="seal-count">0 / 0</div>
    </div>
    <hr class="divider">
    <div id="sections-container"></div>
    <div id="cel-inline" class="inline-action" style="display:none"></div>
</div>

<script src="shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    VerifyPage.init({
        stopLabel:    "STOP 03 — WEBFLEET",
        pageTitle:    "Verify Your Solutions",
        pageSubtitle: "Enter what you discovered to break the seals.",
        sections: [
            {
                items: [
                    { type: 'text', label: "Where should you go next? Latitude (use format xx.x)",
                        answers: ["51°20'34.2\"N"],
                        prefix:"51°20'",
                        showAddon: true,
                        suffix: "\"N",
                        hint: "" },
                    { type: 'text', label: "Where should you go next? Longitude (use format xx.x)",
                        answers: ["12°23'06.6\"E"],
                        prefix:"12°23'",
                        suffix: "\"E",
                        showAddon: true,
                        hint: "" },
                    { type: 'text', label: "What should you look for?",
                        answers: ["QR-CODE", "QRCODE", "QR", "QR CODE"], hint: "" },
                ]
            }
        ],
        successType: 'scan-qr',
        nextPage:    ''
    });
});
</script>
</body>
</html>
