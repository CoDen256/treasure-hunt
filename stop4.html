<script>
document.addEventListener('DOMContentLoaded', function() {

        stopLabel:    "STOP 04 — NOVA POST",

        pageSubtitle: "Solve what's below to open the final note.",
        sections: [
            {
                type:  'display',
                label: "Leipzig Trivia",
                text:  "In 1833, a German economist proposed something Saxony had never seen: a line that would not simply connect two ends of one city, but stretch between two entire cities. He would not live to see how far his idea would travel — but Saxony did not forget who first spoke it aloud.\n"
+ "Search for the man and for what he proposed — a line, not yet built, connecting two cities whose names still appear on trains today.\n"
+ "Somewhere in this city, the memory of that beginning still stands — the names of the men who made it real, and the story of how it came to be, kept where anyone can find it, if they know what they're looking for.\n"
+ "Find where that memory stands."
            },
            {
                title: "Listen & Decode",
