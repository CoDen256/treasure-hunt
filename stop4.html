<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#17101f">
    <title>Break Every Seal - Stop 04</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600;1,9..144,700&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
</head>
<body>

<div id="sparkles"></div>

<div id="cel-overlay" class="cel-overlay">
    <div class="cel-seal">&amp;</div>
    <h2 class="cel-title">Every seal broken.</h2>
    <p class="cel-sub" id="cel-sub">You've solved this stop.</p>
    <div id="cel-action"></div>
</div>

<div class="wrap">
    <div class="eyebrow" id="eyebrow-label"></div>
    <h1 class="title" id="page-title"></h1>
    <p class="subtitle" id="page-subtitle"></p>
    <div class="progress-wrap">
        <div class="seal-strand" id="seal-strand"></div>
        <div class="seal-count" id="seal-count">0 / 0</div>
    </div>
    <hr class="divider">
    <div id="sections-container"></div>
    <div id="cel-inline" class="inline-action" style="display:none"></div>
</div>

<script src="shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    VerifyPage.init({
        stopLabel:    "STOP 04 — [LOCATION]",
        pageTitle:    "Break Every Seal",
        pageSubtitle: "Solve what's below to open the final note.",
        sections: [
            {
                title: "The Notes",
                note:  "Work through these together.",
                items: [
                    {
                        type:     'text',
                        label:    "Note 01",
                        question: "Replace this with your first riddle or question.",
                        answers:  ["example answer"],
                        hint:     ""
                    },
                    {
                        type:     'text',
                        label:    "Note 02",
                        question: "Replace this with your second riddle or question.",
                        answers:  ["example answer"],
                        hint:     "You can add an optional nudge here."
                    }
                ]
            },
            {
                title: "Enclosures",
                note:  "No titles. No names. Just listen.",
                items: [
                    // src: path to audio file, e.g. "songs/track1.mp3"
                    // Leave "" until real files are added.
                    { type: 'audio', src: "", answers: ["song one title"],   hint: "" },
                    { type: 'audio', src: "", answers: ["song two title"],   hint: "" },
                    { type: 'audio', src: "", answers: ["song three title"], hint: "" },
                    { type: 'audio', src: "", answers: ["song four title"],  hint: "" },
                    { type: 'audio', src: "", answers: ["song five title"],  hint: "" },
                    { type: 'audio', src: "", answers: ["song six title"],   hint: "" }
                ]
            },
            {
                items: [
                    { type: 'text', label: "Where should you go next?", answers: ["answer 1"], hint: "" },
                    { type: 'text', label: "What should you do there?",  answers: ["answer 2"], hint: "" },
                    // Date answer must be in YYYY-MM-DD format (how the date picker stores it internally)
                    { type: 'date', label: "Password",                   answers: ["2026-07-21"], hint: "" }
                ]
            }
        ],
        successType: 'normal',
        nextPage:    'stop5.html'
    });
});
</script>
</body>
</html>
