<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#17101f">
    <title>Break Every Seal – Stop 06</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600;1,9..144,700&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink: #17101f; --plum: #2a1a34; --wine: #3a1d30;
            --parchment: #f4ecdd; --muted: #b2a5c2;
            --seal: #d6a05c; --seal-light: #f0c988; --seal-deep: #9c6a34;
            --mint: #8fdba8; --rose: #e69090;
            --card-bg: rgba(255,255,255,0.035);
            --card-line: rgba(214,160,92,0.28);
            --card-line-soft: rgba(214,160,92,0.12);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; min-height: 100%; overflow-x: hidden; }
        body {
            background-image:
                radial-gradient(circle, rgba(244,236,221,0.035) 1px, transparent 1.2px),
                linear-gradient(165deg, var(--ink), var(--plum) 55%, var(--wine));
            background-size: 3px 3px, cover;
            background-repeat: repeat, no-repeat;
            background-attachment: fixed, fixed;
            color: var(--parchment);
            font-family: 'Manrope', sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }
        #sparkles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
        .sparkle { position: absolute; bottom: -10px; border-radius: 50%; background: var(--seal-light); opacity: 0; animation: float-up linear infinite; }
        .confetti { position: absolute; top: -12px; }
        @keyframes float-up { 0% { transform: translateY(0) translateX(0); opacity: 0; } 10% { opacity: 0.5; } 90% { opacity: 0.2; } 100% { transform: translateY(-110vh) translateX(var(--drift,20px)); opacity: 0; } }
        @keyframes confetti-fall { 0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 1; } 80% { opacity: 0.7; } 100% { transform: translateY(110vh) rotate(var(--rot,360deg)) translateX(var(--drift,60px)); opacity: 0; } }
        .wrap { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; padding: 40px 24px calc(80px + env(safe-area-inset-bottom)); }
        .eyebrow { text-align: center; font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--seal); margin-bottom: 14px; }
        h1.title { font-family: 'Fraunces', serif; font-weight: 600; font-size: 34px; line-height: 1.2; text-align: center; margin: 0 0 10px; color: var(--parchment); }
        .subtitle { text-align: center; font-size: 14.5px; line-height: 1.6; color: var(--muted); margin: 0 0 32px; }
        .progress-wrap { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 32px; }
        .seal-strand { display: flex; gap: 10px; }
        .seal-dot { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid rgba(214,160,92,0.4); display: flex; align-items: center; justify-content: center; font-family: 'Fraunces', serif; font-size: 9px; color: transparent; transition: all 0.4s cubic-bezier(.34,1.56,.64,1); }
        .seal-dot.opened { background: radial-gradient(circle at 35% 30%, var(--seal-light), var(--seal-deep)); border-color: var(--seal); color: #3a2210; transform: scale(1.15); }
        .seal-count { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--muted); }
        .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--card-line), transparent); margin: 0 0 32px; border: none; }
        .card { position: relative; background: var(--card-bg); border: 1px solid var(--card-line); border-radius: 10px; padding: 26px 24px; margin-bottom: 18px; overflow: visible; transition: border-color 0.4s; }
        .card::before { content: ''; position: absolute; inset: 7px; border: 1px solid var(--card-line-soft); border-radius: 5px; pointer-events: none; }
        .card.solved { border-color: rgba(143,219,168,0.45); }
        .card.shake { animation: shake 0.4s; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-7px); } 75% { transform: translateX(7px); } }
        .stamp { position: absolute; top: -13px; right: -11px; width: 36px; height: 36px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, var(--seal-light), var(--seal-deep)); display: flex; align-items: center; justify-content: center; font-family: 'Fraunces', serif; font-style: italic; font-size: 16px; color: #3a2210; opacity: 0; transform: scale(0) rotate(-25deg); transition: opacity 0.3s, transform 0.4s cubic-bezier(.34,1.56,.64,1); box-shadow: 0 3px 12px rgba(0,0,0,0.4); pointer-events: none; }
        .stamp.show { opacity: 1; transform: scale(1) rotate(-12deg); }
        .item-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
        .input-row { display: flex; align-items: center; gap: 10px; }
        input[type="text"] { flex: 1; min-width: 0; height: 52px; padding: 0 18px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.16); border-radius: 8px; color: var(--parchment); font-family: 'Manrope', sans-serif; font-size: 17px; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: var(--seal); }
        input[type="text"]:disabled { opacity: 0.6; }
        .btn-check { height: 52px; padding: 0 22px; background: linear-gradient(135deg, var(--seal-light), var(--seal-deep)); border: none; border-radius: 8px; color: #3a2210; font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 14.5px; white-space: nowrap; cursor: pointer; transition: transform 0.15s; }
        .btn-check:active { transform: scale(0.95); }
        .btn-check.done { background: transparent; border: 1.5px solid var(--mint); color: var(--mint); }
        .feedback { min-height: 18px; font-size: 13.5px; margin-top: 10px; }
        .feedback.correct { color: var(--mint); }
        .feedback.wrong { color: var(--rose); }
        .hint-toggle { margin-top: 10px; padding: 0; background: none; border: none; font-family: 'Manrope', sans-serif; font-size: 12.5px; color: var(--muted); text-decoration: underline; text-underline-offset: 2px; cursor: pointer; display: inline-block; }
        .hint-text { display: none; margin-top: 8px; padding: 10px 14px; background: rgba(214,160,92,0.08); border-left: 2px solid var(--seal); border-radius: 0 5px 5px 0; font-size: 13px; font-style: italic; color: var(--seal-light); }
        .hint-text.show { display: block; }
        .cel-overlay { position: fixed; inset: 0; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(23,16,31,0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); opacity: 0; pointer-events: none; transition: opacity 0.5s ease; padding: 32px; }
        .cel-overlay.show { opacity: 1; pointer-events: all; }
        .cel-seal { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, var(--seal-light), var(--seal-deep)); display: flex; align-items: center; justify-content: center; font-family: 'Fraunces', serif; font-style: italic; font-size: 58px; color: #3a2210; box-shadow: 0 10px 60px rgba(214,160,92,0.65); animation: bigPop 0.75s cubic-bezier(.34,1.56,.64,1) 0.05s both; }
        @keyframes bigPop { from { transform: scale(0) rotate(-40deg); opacity: 0; } to { transform: scale(1) rotate(-6deg); opacity: 1; } }
        .cel-title { font-family: 'Fraunces', serif; font-style: italic; font-weight: 600; font-size: 34px; color: var(--parchment); margin: 22px 0 8px; text-align: center; animation: slideUp 0.5s ease 0.4s both; }
        .cel-sub { font-size: 15px; color: var(--muted); margin: 0 0 36px; text-align: center; line-height: 1.6; animation: slideUp 0.5s ease 0.55s both; }
        .next-btn { display: inline-block; padding: 20px 56px; background: linear-gradient(135deg, var(--seal-light), var(--seal-deep)); border: none; border-radius: 12px; color: #3a2210; font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 19px; text-decoration: none; cursor: pointer; box-shadow: 0 8px 32px rgba(214,160,92,0.45); animation: popBtn 0.6s cubic-bezier(.34,1.56,.64,1) 0.75s both; transition: transform 0.15s; }
        .next-btn:active { transform: scale(0.96); }
        .qr-block, .fin-block { text-align: center; animation: slideUp 0.5s ease 0.65s both; }
        .icon-ring { width: 90px; height: 90px; border-radius: 50%; background: rgba(214,160,92,0.12); display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; font-size: 44px; animation: bigPop 0.7s cubic-bezier(.34,1.56,.64,1) 0.55s both; }
        .icon-ring.green { background: rgba(143,219,168,0.12); }
        .block-title { font-family: 'Fraunces', serif; font-style: italic; font-size: 21px; color: var(--parchment); margin: 0 0 10px; }
        .block-sub { font-size: 14.5px; color: var(--muted); line-height: 1.6; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popBtn { from { opacity: 0; transform: scale(0.75); } to { opacity: 1; transform: scale(1); } }
        @media (prefers-reduced-motion: reduce) { .sparkle, .confetti { display: none; } *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }
    </style>
</head>
<body>
<div id="sparkles"></div>
<div id="cel-overlay" class="cel-overlay">
    <div class="cel-seal">&amp;</div>
    <h2 class="cel-title">Every seal broken.</h2>
    <p class="cel-sub" id="cel-sub">You've solved this stop.</p>
    <div id="cel-action"></div>
</div>
<div class="wrap">
    <div class="eyebrow" id="eyebrow-label"></div>
    <h1 class="title" id="page-title"></h1>
    <p class="subtitle" id="page-subtitle"></p>
    <div class="progress-wrap">
        <div class="seal-strand" id="seal-strand"></div>
        <div class="seal-count" id="seal-count">0 / 0</div>
    </div>
    <hr class="divider">
    <div id="checks-container"></div>
</div>
<script>
    const STOP_LABEL    = "STOP 06 — [LOCATION]";
    const PAGE_TITLE    = "Verify Your Solutions";
    const PAGE_SUBTITLE = "Enter what you discovered to break the seals.";
    const CHECKS = [
        { label: "Where should you go next?", answers: ["answer 1"], hint: "" },
        { label: "What should you do there?",  answers: ["answer 2"], hint: "" },
        { label: "Password",                   answers: ["password"], hint: "" }
    ];
    const SUCCESS_TYPE = 'normal';
    const NEXT_PAGE    = 'stop7.html';

    const solved = new Set();
    function norm(s) { return s.trim().toLowerCase().replace(/æ/g,'ae').replace(/ø/g,'o').replace(/å/g,'a').replace(/ä/g,'a').replace(/ö/g,'o').replace(/ü/g,'u').replace(/ß/g,'ss').replace(/[^\w\s]/g,'').replace(/\s+/g,' '); }
    function init() {
        document.getElementById('eyebrow-label').textContent = STOP_LABEL;
        document.getElementById('page-title').textContent    = PAGE_TITLE;
        document.getElementById('page-subtitle').textContent = PAGE_SUBTITLE;
        document.title = 'Break Every Seal – ' + STOP_LABEL;
        const strand = document.getElementById('seal-strand');
        strand.innerHTML = CHECKS.map((_,i) => '<div class="seal-dot" id="dot-'+i+'">&amp;</div>').join('');
        refreshCount();
        document.getElementById('checks-container').innerHTML = CHECKS.map((c,i) => `<div class="card" id="card-${i}"><div class="stamp" id="stamp-${i}">&amp;</div><div class="item-label">${c.label}</div><div class="input-row"><input type="text" id="inp-${i}" placeholder="Your answer" enterkeyhint="go" onkeydown="if(event.key==='Enter')check(${i})"><button class="btn-check" id="btn-${i}" onclick="check(${i})">Unseal</button></div><div class="feedback" id="fb-${i}"></div>${c.hint ? `<button class="hint-toggle" onclick="toggleHint(${i})">Need a nudge?</button><div class="hint-text" id="hint-${i}">${c.hint}</div>` : ''}</div>`).join('');
        initSparkles();
    }
    function refreshCount() { document.getElementById('seal-count').textContent = solved.size + ' / ' + CHECKS.length; }
    function check(i) {
        if (solved.has(i)) return;
        const inp=document.getElementById('inp-'+i),fb=document.getElementById('fb-'+i),card=document.getElementById('card-'+i),btn=document.getElementById('btn-'+i),stamp=document.getElementById('stamp-'+i),val=norm(inp.value),ok=val.length>0&&CHECKS[i].answers.some(a=>norm(a)===val);
        if (ok) { solved.add(i); inp.disabled=true; btn.textContent='Opened'; btn.classList.add('done'); fb.textContent='Correct — the seal breaks.'; fb.className='feedback correct'; stamp.classList.add('show'); card.classList.add('solved'); document.getElementById('dot-'+i).classList.add('opened'); refreshCount(); if(solved.size===CHECKS.length)setTimeout(celebrate,600); }
        else { fb.textContent='Not quite — try again.'; fb.className='feedback wrong'; card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake'); }
    }
    function toggleHint(i) { document.getElementById('hint-'+i).classList.toggle('show'); }
    function celebrate() {
        burstConfetti(55); burstSparkles(28);
        const sub=document.getElementById('cel-sub'),action=document.getElementById('cel-action');
        if(SUCCESS_TYPE==='normal'){sub.textContent="You've solved this stop — time to move on.";action.innerHTML='<a href="'+NEXT_PAGE+'" class="next-btn">Next Stop →</a>';}
        else if(SUCCESS_TYPE==='scan-qr'){sub.textContent="You've solved this stop.";action.innerHTML='<div class="qr-block"><div class="icon-ring">&#128247;</div><p class="block-title">Find the QR code</p><p class="block-sub">Scan it at the location to unlock<br>the next stop and continue.</p></div>';}
        else{sub.textContent="You've completed the final stop!";action.innerHTML='<div class="fin-block"><div class="icon-ring green">&#127881;</div><p class="block-title">The journey is complete.</p><p class="block-sub">Every seal has been broken.<br>Well done — you made it!</p></div>';}
        setTimeout(()=>document.getElementById('cel-overlay').classList.add('show'),80);
    }
    function spawnSparkle(c,fast){const el=document.createElement('div');el.className='sparkle';const s=Math.random()*4+2;el.style.width=s+'px';el.style.height=s+'px';el.style.left=Math.random()*100+'%';el.style.setProperty('--drift',(Math.random()-0.5)*(fast?100:60)+'px');const dur=fast?Math.random()*2.5+2:Math.random()*10+12;el.style.animationDuration=dur+'s';if(!fast)el.style.animationDelay=Math.random()*dur+'s';c.appendChild(el);if(fast)setTimeout(()=>el.remove(),dur*1000+400);}
    function initSparkles(){const c=document.getElementById('sparkles');for(let i=0;i<14;i++)spawnSparkle(c,false);}
    function burstSparkles(n){const c=document.getElementById('sparkles');for(let i=0;i<n;i++)spawnSparkle(c,true);}
    function burstConfetti(n){const c=document.getElementById('sparkles');const cols=['#f0c988','#d6a05c','#8fdba8','#e69090','#f4ecdd','#c9b2e8','#9c6a34','#b2a5c2'];for(let i=0;i<n;i++){const el=document.createElement('div');el.className='confetti';const sz=Math.random()*9+4;const circ=Math.random()>0.4;Object.assign(el.style,{width:sz+'px',height:(circ?sz:sz*(Math.random()*1.4+0.5))+'px',borderRadius:circ?'50%':'2px',background:cols[Math.floor(Math.random()*cols.length)],left:Math.random()*100+'%',opacity:(Math.random()*0.7+0.3).toString(),animationDuration:(Math.random()*2+2.5)+'s',animationDelay:(Math.random()*0.9)+'s',animationName:'confetti-fall',animationTimingFunction:'ease-in',animationFillMode:'forwards'});el.style.setProperty('--rot',(Math.random()*720-360)+'deg');el.style.setProperty('--drift',(Math.random()-0.5)*240+'px');c.appendChild(el);setTimeout(()=>el.remove(),4200);}}
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
