<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#17101f">
    <title>Break Every Seal – Stop 09</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500;1,9..144,600;1,9..144,700&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="shared.css">
</head>
<body>

<div id="sparkles"></div>

<div id="cel-overlay" class="cel-overlay">
    <div class="cel-seal">&amp;</div>
    <h2 class="cel-title">Every seal broken.</h2>
    <p class="cel-sub" id="cel-sub">You've solved this stop.</p>
    <div id="cel-action"></div>
</div>

<div class="wrap">
    <div class="eyebrow" id="eyebrow-label"></div>
    <h1 class="title" id="page-title"></h1>
    <p class="subtitle" id="page-subtitle"></p>
    <div class="progress-wrap">
        <div class="seal-strand" id="seal-strand"></div>
        <div class="seal-count" id="seal-count">0 / 0</div>
    </div>
    <hr class="divider">
    <div id="sections-container"></div>
    <div id="cel-inline" class="inline-action" style="display:none"></div>
</div>

<script src="shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    VerifyPage.init({
        stopLabel:   "STOP 09 — [Bohemian Kids]",
        pageTitle:   "Verify Your Solutions",
        pageSubtitle: "This leads to your final stop..",
        sections: [
            {
                items: [
                    { type: 'text', label: "Where should you go next?", answers: ["HOME"], hint: "" },
                ]
            }
        ],
        successType: 'final',
        nextPage:    ''
    });
});
</script>
</body>
</html>
